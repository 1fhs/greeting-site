<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تهنئة عيد الفطر المبارك</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&family=Amiri:wght@700&display=swap" rel="stylesheet">
  <style>
    :root{
      --gold:#d4af37;
      --gold2:#f4df95;
      --purple:#4a235a;
      --bg:#0f0f0f;
      --bg2:#1a1322;
      --text:#fff;
      --soft:#e8d8a5;
    }
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
      font-family:"Cairo",sans-serif;color:var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(212,175,55,.08), transparent 25%),
        radial-gradient(circle at 80% 15%, rgba(255,255,255,.05), transparent 18%),
        linear-gradient(135deg,var(--bg),var(--bg2));
      overflow:hidden;padding:20px;
    }
    .stars,.stars::before,.stars::after{
      content:"";position:absolute;inset:0;background-image:
      radial-gradient(2px 2px at 10% 20%, #fff 45%, transparent 50%),
      radial-gradient(2px 2px at 22% 72%, #fff 45%, transparent 50%),
      radial-gradient(2px 2px at 81% 16%, #fff 45%, transparent 50%),
      radial-gradient(2px 2px at 69% 68%, #fff 45%, transparent 50%),
      radial-gradient(2px 2px at 48% 34%, #fff 45%, transparent 50%),
      radial-gradient(2px 2px at 92% 83%, #fff 45%, transparent 50%),
      radial-gradient(2px 2px at 6% 86%, #fff 45%, transparent 50%);
      animation: twinkle 6s linear infinite;
      opacity:.75;
      pointer-events:none;
    }
    .stars::before{transform:translateY(-12px);opacity:.45;animation-duration:9s}
    .stars::after{transform:translateY(18px);opacity:.3;animation-duration:12s}
    @keyframes twinkle{50%{opacity:.35}}
    .moon{
      position:absolute;top:55px;right:70px;width:96px;height:96px;border-radius:50%;
      background:linear-gradient(145deg,var(--gold2),var(--gold));
      box-shadow:0 0 30px rgba(212,175,55,.25);
    }
    .moon::after{
      content:"";position:absolute;inset:10px 14px 10px 10px;border-radius:50%;
      background:linear-gradient(135deg,var(--bg),var(--bg2));
    }
    .card{
      width:min(100%,520px);position:relative;z-index:2;
      background:rgba(74,35,90,.76);border:1px solid rgba(212,175,55,.28);
      backdrop-filter:blur(10px);border-radius:28px;padding:34px 24px;
      box-shadow:0 18px 55px rgba(0,0,0,.4);
      text-align:center;
    }
    h1{margin:0 0 12px;font-family:"Amiri",serif;font-size:2.5rem;color:var(--gold)}
    p{margin:0 0 22px;color:var(--soft);line-height:1.9}
    .frame{
      border:1px solid rgba(244,223,149,.22);padding:18px;border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
    }
    input{
      width:100%;padding:15px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.07);color:#fff;font-size:1rem;outline:none;font-family:inherit;
      margin-bottom:14px;
    }
    input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,.15)}
    button{
      width:100%;padding:15px;border:none;border-radius:14px;cursor:pointer;font-family:inherit;
      font-size:1.05rem;font-weight:800;color:#1b1024;
      background:linear-gradient(135deg,var(--gold2),var(--gold));
      box-shadow:0 10px 25px rgba(212,175,55,.25);transition:.18s ease;
    }
    button:hover{transform:translateY(-2px)}
    .mini{font-size:.86rem;margin-top:14px;color:#d8c27c}
    .ornament{display:flex;justify-content:center;gap:14px;margin-bottom:16px;opacity:.9}
    .ornament span{width:10px;height:10px;border-radius:50%;background:var(--gold2);box-shadow:0 0 10px rgba(244,223,149,.35)}
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="moon"></div>
  <div class="card">
    <div class="ornament"><span></span><span></span><span></span></div>
    <h1>تهنئة عيد الفطر المبارك</h1>
    <p>تصميم فاخر بلمسة إسلامية حديثة. اكتب الاسم ليتم عرض تهنئة احترافية خاصة بالعيد.</p>
    <div class="frame">
      <input id="nameInput" type="text" placeholder="اكتب الاسم هنا" />
      <button id="goBtn">عرض التهنئة</button>
      <div class="mini">سيظهر الاسم داخل بطاقة تهنئة عيدية مزخرفة.</div>
    </div>
  </div>
  <script>
    const input = document.getElementById('nameInput');
    const goBtn = document.getElementById('goBtn');
    function go(){
      const name = input.value.trim();
      if(!name){ input.focus(); return; }
      location.href = 'greeting.html?name=' + encodeURIComponent(name);
    }
    goBtn.addEventListener('click', go);
    input.addEventListener('keydown', e => { if(e.key === 'Enter') go(); });
  </script>
</body>
</html>
