<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تهنئة عيد الفطر المبارك</title>
    <meta name="description" content="موقع فاخر للتهنئة بعيد الفطر المبارك مع إدخال الاسم للتهنئة الشخصية." />
    <!-- Import Google Fonts for Arabic typography -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri:wght@700&display=swap" rel="stylesheet" />
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-p8f3W+Jhk+BT3cY2pK6G/nPktF2LXvRV5iTs8mBd7iCQfqq9eIyxYx4jMgqVk5WYhIOKk9YtVHIpi/k2v48vYw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
      :root {
        --gold: #d4af37;
        --purple: #4a235a;
        --dark: #0f0f0f;
        --text: #ffffff;
        --accent-light: #e5c97d;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Cairo', sans-serif;
        background: linear-gradient(135deg, var(--dark), #1a1423);
        color: var(--text);
        min-height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      /* Floating decorative icons */
      .decorations {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        pointer-events: none;
        z-index: 0;
      }
      .decorations i {
        position: absolute;
        font-size: 2rem;
        color: var(--accent-light);
        opacity: 0.8;
        animation: float 20s linear infinite;
      }
      /* Random positions and durations for stars and moon */
      .decorations .star1 { top: 10%; left: 5%; font-size: 1.2rem; animation-duration: 18s; }
      .decorations .star2 { top: 25%; left: 40%; font-size: 1.6rem; animation-duration: 22s; }
      .decorations .star3 { top: 60%; left: 70%; font-size: 1.3rem; animation-duration: 26s; }
      .decorations .star4 { top: 80%; left: 15%; font-size: 1rem; animation-duration: 19s; }
      .decorations .moon { top: 35%; left: 80%; font-size: 3rem; color: var(--gold); animation-duration: 28s; }
      @keyframes float {
        0% { transform: translateY(0) rotate(0deg); opacity: 0.9; }
        50% { opacity: 0.7; }
        100% { transform: translateY(-50vh) rotate(360deg); opacity: 0.9; }
      }

      .card {
        position: relative;
        z-index: 1;
        background: rgba(74, 35, 90, 0.8);
        border: 1px solid rgba(212, 175, 55, 0.3);
        border-radius: 24px;
        padding: 2.5rem 2rem;
        max-width: 480px;
        width: 100%;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(8px);
      }

      .card h1 {
        font-family: 'Amiri', serif;
        font-size: 2.2rem;
        margin-bottom: 1rem;
        color: var(--gold);
        text-align: center;
      }

      .card p {
        font-size: 1.1rem;
        margin-bottom: 2rem;
        text-align: center;
        color: var(--accent-light);
      }

      .input-group {
        display: flex;
        gap: 0.5rem;
        flex-direction: column;
      }
      .input-group input {
        width: 100%;
        padding: 0.8rem 1rem;
        font-size: 1rem;
        border: 1px solid rgba(212, 175, 55, 0.3);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        border-radius: 12px;
        outline: none;
      }
      .input-group input:focus {
        border-color: var(--gold);
        box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.3);
      }
      .input-group button {
        margin-top: 1rem;
        padding: 0.8rem;
        font-size: 1.1rem;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, var(--gold), var(--purple));
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      .input-group button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(212, 175, 55, 0.35);
      }
      .input-group button:active {
        transform: translateY(0);
      }

      .note {
        margin-top: 1rem;
        font-size: 0.85rem;
        color: var(--accent-light);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="decorations">
      <i class="fa-solid fa-star star1"></i>
      <i class="fa-solid fa-star star2"></i>
      <i class="fa-solid fa-star star3"></i>
      <i class="fa-solid fa-star star4"></i>
      <i class="fa-solid fa-moon moon"></i>
    </div>
    <div class="card">
      <h1>تهنئة عيد الفطر المبارك</h1>
      <p>أدخل اسمك لتلقي رسالة تهنئة فاخرة مخصصة لك</p>
      <div class="input-group">
        <input id="nameInput" type="text" placeholder="اكتب اسمك" autocomplete="off" />
        <button id="submitBtn" type="button">عرض التهنئة</button>
      </div>
      <div class="note">* سيظهر اسمك في التهنئة الرسمية للعيد.</div>
    </div>
    <script>
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.addEventListener('click', function () {
        const name = document.getElementById('nameInput').value.trim();
        if (!name) {
          alert('يرجى إدخال اسمك أولاً.');
          return;
        }
        // Navigate to greeting page with encoded name parameter
        window.location.href = 'greeting.html?name=' + encodeURIComponent(name);
      });
      // allow Enter key to submit
      document.getElementById('nameInput').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') submitBtn.click();
      });
    </script>
  </body>
</html>
