<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تهنئة عيد الفطر المبارك - رسالتك الخاصة</title>
    <meta name="description" content="عرض تهنئة عيد الفطر المبارك مع رسالة شخصية وعناصر احتفالية." />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri:wght@700&display=swap" rel="stylesheet" />
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-p8f3W+Jhk+BT3cY2pK6G/nPktF2LXvRV5iTs8mBd7iCQfqq9eIyxYx4jMgqVk5WYhIOKk9YtVHIpi/k2v48vYw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
      :root {
        --gold: #d4af37;
        --purple: #4a235a;
        --dark: #0f0f0f;
        --text: #ffffff;
        --accent-light: #e5c97d;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Cairo', sans-serif;
        background: linear-gradient(135deg, var(--dark), #1a1423);
        color: var(--text);
        min-height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .message-box {
        position: relative;
        z-index: 1;
        background: rgba(74, 35, 90, 0.8);
        border: 1px solid rgba(212, 175, 55, 0.3);
        border-radius: 28px;
        padding: 2rem 2rem 2.5rem;
        max-width: 660px;
        width: 100%;
        text-align: center;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(8px);
      }
      .message-box h1 {
        font-family: 'Amiri', serif;
        font-size: 2.4rem;
        margin-bottom: 1rem;
        color: var(--gold);
      }
      .message-box h2 {
        font-size: 1.3rem;
        margin-bottom: 1.8rem;
        color: var(--accent-light);
      }
      .icons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 1.5rem;
        margin-bottom: 1.6rem;
      }
      .icons i {
        font-size: 2.2rem;
        color: var(--accent-light);
      }
      .audio-container {
        margin-top: 1.5rem;
      }
      audio {
        width: 100%;
        max-width: 420px;
      }
      /* Confetti (stars) styles */
      .confetti-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
        z-index: 0;
      }
      .confetti {
        position: absolute;
        color: var(--gold);
        font-size: 1.2rem;
        opacity: 0.9;
        animation: fall 4.5s linear forwards;
      }
      @keyframes fall {
        from {
          transform: translateY(-5%);
          opacity: 1;
        }
        to {
          transform: translateY(105vh) rotate(720deg);
          opacity: 0;
        }
      }
      @media (max-width: 540px) {
        .message-box h1 { font-size: 1.8rem; }
        .message-box h2 { font-size: 1.1rem; }
        .icons i { font-size: 1.8rem; }
      }
    </style>
  </head>
  <body>
    <div class="confetti-container" id="confettiContainer"></div>
    <div class="message-box">
      <h1>عيد فطر مبارك، <span id="namePlaceholder"></span>!</h1>
      <h2>تقبل الله منا ومنكم وجعل أيامكم كلها فرحًا وسعادة</h2>
      <div class="icons">
        <i class="fa-solid fa-cannon" aria-label="مدفع العيد"></i>
        <i class="fa-solid fa-mosque" aria-label="مسجد"></i>
        <i class="fa-solid fa-sparkles" aria-label="نجوم"></i>
      </div>
      <p style="line-height: 1.8; color: var(--accent-light);">
        مع انطلاق مدفع العيد وتردد تكبيرات العيد من المآذن، نهنئكم بحلول عيد الفطر المبارك،
        ونسأل الله أن يعيده عليكم بالخير والبركة وأن يرزقكم الفرح والطمأنينة.<br />
        عساكم من عواده وكل عام وأنتم بألف خير.
      </p>
      <div class="audio-container">
        <audio controls>
          <source src="https://dn711103.ca.archive.org/0/items/EidTakbirBySheikhAliMullah/EidTakbirBySheikhAliMullah.mp3" type="audio/mpeg" />
          متصفحك لا يدعم تشغيل الصوت.
        </audio>
      </div>
    </div>
    <script>
      // Get name from URL parameter
      const params = new URLSearchParams(window.location.search);
      const name = params.get('name') ? decodeURIComponent(params.get('name')) : 'ضيفنا العزيز';
      document.getElementById('namePlaceholder').textContent = name;

      // Confetti effect using star icons
      function createConfetti(count) {
        const container = document.getElementById('confettiContainer');
        const colors = ['#d4af37', '#e5c97d', '#be9ee9', '#f5e6b0'];
        for (let i = 0; i < count; i++) {
          const star = document.createElement('i');
          star.className = 'fa-solid fa-star confetti';
          star.style.left = Math.random() * 100 + '%';
          star.style.top = '-10%';
          const scale = 0.8 + Math.random() * 0.6;
          star.style.fontSize = (1.2 * scale) + 'rem';
          star.style.color = colors[Math.floor(Math.random() * colors.length)];
          star.style.animationDuration = (3.5 + Math.random() * 1.5) + 's';
          container.appendChild(star);
          setTimeout(() => {
            star.remove();
          }, 5500);
        }
      }
      // Launch confetti at intervals
      function launchConfetti() {
        createConfetti(14);
        setTimeout(launchConfetti, 1800);
      }
      launchConfetti();
    </script>
  </body>
</html>
